name: Zenith CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Create .env file (IMPORTANT)
      - name: Create .env file
        run: |
          echo "POSTGRES_USER=user" >> .env
          echo "POSTGRES_PASSWORD=password" >> .env
          echo "POSTGRES_DB=orchestrator_db" >> .env
          echo "DATABASE_URL=postgresql://user:password@db:5432/orchestrator_db" >> .env
          echo "REDIS_URL=redis://redis:6379/0" >> .env
          echo "PROJECT_NAME=Star Orchestrator Pro" >> .env
          echo "ZENITH_API_KEY=pro_level_key_123" >> .env

      # 3. Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build containers
      - name: Build Docker Images
        run: docker-compose build

      # 5. Run containers
      - name: Run Containers
        run: docker-compose up -d

      # 6. Wait for services to be ready
      - name: Wait for services
        run: sleep 20

      # 7. Health check (FastAPI)
      - name: Check App Health
        run: curl --fail http://localhost:8000 || exit 1

      # 8. Stop containers (cleanup)
      - name: Stop Containers
        if: always()
        run: docker-compose down