name: Zenith CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create .env file
        run: |
          echo "POSTGRES_USER=user" >> .env
          echo "POSTGRES_PASSWORD=password" >> .env
          echo "POSTGRES_DB=orchestrator_db" >> .env
          echo "DATABASE_URL=postgresql://user:password@db:5432/orchestrator_db" >> .env
          echo "REDIS_URL=redis://redis:6379/0" >> .env
          echo "PROJECT_NAME=Star Orchestrator Pro" >> .env
          echo "ZENITH_API_KEY=pro_level_key_123" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Images
        run: docker compose build

      - name: Run Containers
        run: docker compose up -d

      - name: Wait for services
        run: sleep 30

      - name: Show container logs
        run: docker compose logs

      - name: Check App Health
        run: |
          for i in $(seq 1 15); do
            curl -f http://localhost:8000 && exit 0
            echo "Waiting for app..."
            sleep 5
          done
          echo "App failed to start"
          exit 1

      - name: Stop Containers
        if: always()
        run: docker compose down